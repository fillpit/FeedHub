changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot[bot]
  categories:
    - title: "🔒 Security"
      labels:
        - security
        - vulnerability
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "📝 Documentation"
      labels:
        - documentation
        - docs
    - title: "🔄 Dependency Updates"
      labels:
        - dependencies
    - title: "📈 General Changes"
      labels:
        - "*"
