services:
  feed-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: feed-hub:latest
    container_name: feed-hub
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3001}:3001"
    volumes:
      - feed-hub-data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=${DB_PATH:-/app/data/data.db}
      - PORT=3001
volumes:
  feed-hub-data:
    driver: local
